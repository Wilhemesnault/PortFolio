  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<aside>
  <div class="avatar">WE</div><!-- MODIFIE : tes initiales -->
  <div class="sidebar-name"></div>
  <div class="sidebar-role"></div>

  <nav>
    <a href="index.html"><span class="icon">◈</span> Présentation</a>
    <a href="cv.html" class="active"><span class="icon">◎</span> CV</a>
    <a href="missions.html"><span class="icon">◇</span> Missions AP</a>

  </nav>

  <div class="sidebar-footer">
    Portfolio de compétences<br>
    2025 – 2026
  </div>
</aside>

<main>
  <div class="page-header">
    <div class="dot-row"><div class="dot"></div><div class="dot accent"></div><div class="dot"></div></div>
    <h2>Curriculum Vitæ</h2>
    <p>Clique sur le bouton pour afficher mon CV</p>
  </div>

  <button class="cv-btn" onclick="openCV()">
    <span class="icon">◎</span> Voir le CV
  </button>
</main>

<!-- OVERLAY CV -->
<div class="cv-overlay" id="cv-overlay">
  <div class="cv-overlay-inner">
    <button class="cv-overlay-close" onclick="closeCV()">✕</button>

    <!-- ══ MODIFIE : remplace "cv.png" par le nom de ton fichier image ══ -->
    <img class="cv-image" src="IMG/CV_ESNAULT_Wilhem.png" alt="Mon CV"
         onerror="this.style.display='none'; document.getElementById('cv-placeholder').style.display='flex';" />

    <div class="cv-image-placeholder" id="cv-placeholder" style="display:none;">
      <span class="big">◎</span>
      Place ton fichier CV ici<br>
      <small>Renomme ton image en <strong>cv.png</strong> et mets-la dans le dossier PortFolio</small>
    </div>
  </div>
</div>

<script src="script.js"></script>
